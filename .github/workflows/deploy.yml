name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # Spin up Postgres (with pgvector) and Redis service containers for integration testing
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knowledge_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run PyTest suite
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledge_db_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: "temporary_test_secret_key_for_ci_cd"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          GOOGLE_API_KEY: "mock_key_for_testing"
        run: |
          cd backend
          PYTHONPATH=. pytest tests/test_retrieval_pipeline.py -v
          PYTHONPATH=. pytest tests/test_perf.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/ai-knowledge-backend:$IMAGE_TAG \
            -t $REGISTRY/ai-knowledge-backend:latest \
            ./backend
          docker push $REGISTRY/ai-knowledge-backend:$IMAGE_TAG
          docker push $REGISTRY/ai-knowledge-backend:latest

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/ai-knowledge-frontend:$IMAGE_TAG \
            -t $REGISTRY/ai-knowledge-frontend:latest \
            ./frontend
          docker push $REGISTRY/ai-knowledge-frontend:$IMAGE_TAG
          docker push $REGISTRY/ai-knowledge-frontend:latest

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log into ECR on the EC2 host
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # Navigate to the project root directory
            cd ~/AI-Knowledge-Assistant
            
            # Pull the new container builds
            docker compose pull backend frontend
            
            # Force recreate containers with fresh images
            docker compose up -d --force-recreate backend frontend
            
            # Prune obsolete/dangling docker images
            docker image prune -f
